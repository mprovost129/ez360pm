<aside class="app-sidebar" aria-label="Primary navigation">
    <form class="quick-note" method="post" action="{% url 'intake:quick-add' %}">
        {% csrf_token %}
        <div class="quick-note__name">
            {{ quick_note_form.contact_first_name }}
            {{ quick_note_form.contact_last_name }}
        </div>
        {{ quick_note_form.prospect_company_name }}
        {{ quick_note_form.body }}
        <input type="hidden" name="next" value="{{ request.get_full_path }}">
        <button class="btn btn-primary btn-sm" type="submit">Save note</button>
    </form>
    <nav class="nav flex-row flex-md-column">
        <a class="nav-link" href="{% url 'core:home' %}">
            <i class="bi bi-grid" aria-hidden="true"></i>
            Dashboard
        </a>
        <a class="nav-link" href="{% url 'intake:list' %}"><i class="bi bi-inbox" aria-hidden="true"></i>Notes</a>
        <a class="nav-link" href="{% url 'clients:list' %}"><i class="bi bi-people" aria-hidden="true"></i>Clients</a>
        <a class="nav-link" href="{% url 'projects:list' %}"><i class="bi bi-house-door" aria-hidden="true"></i>Projects</a>
        <a class="nav-link" href="{% url 'projects:time-list' %}"><i class="bi bi-clock" aria-hidden="true"></i>Time</a>
        <a class="nav-link" href="{% url 'proposals:list' %}"><i class="bi bi-file-earmark-check" aria-hidden="true"></i>Proposals</a>
        <a class="nav-link" href="{% url 'documents:invoice-list' %}"><i class="bi bi-receipt" aria-hidden="true"></i>Invoices</a>
        <a class="nav-link" href="{% url 'core:revenue' %}"><i class="bi bi-cash-coin" aria-hidden="true"></i>Revenue</a>
        <a class="nav-link" href="{% url 'accounts:settings' %}"><i class="bi bi-gear" aria-hidden="true"></i>Settings</a>
        {% if user.is_staff %}
        <a class="nav-link" href="{% url 'admin:index' %}">
            <i class="bi bi-gear" aria-hidden="true"></i>
            Administration
        </a>
        {% endif %}
    </nav>
</aside>
