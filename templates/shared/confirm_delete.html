{% extends 'base.html' %}

{% block title %}{{ page_title }} | EZ360PM{% endblock %}

{% block content %}
<div class="page-heading"><h1>{{ page_title }}</h1></div>
<section class="content-card narrow-card">
    <p>Delete <strong>{{ object }}</strong>?</p>
    {% if warning %}<p class="text-danger">{{ warning }}</p>{% endif %}
    <form method="post">
        {% csrf_token %}
        <button class="btn btn-danger" type="submit">Delete</button>
        <button class="btn btn-light" type="button" onclick="history.back()">Cancel</button>
    </form>
</section>
{% endblock %}
