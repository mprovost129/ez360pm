{% extends 'base.html' %}

{% block title %}Log in | EZ360PM{% endblock %}

{% block auth_content %}
<section class="auth-card">
<p class="eyebrow">Provost Home Design</p>
<h1>Log in to EZ360PM</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}
    <button type="submit">Log in</button>
</form>
</section>
{% endblock %}
