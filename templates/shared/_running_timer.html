<div class="header-timer">
    {% if running_time_entry %}
    <div class="header-timer__running" data-running-timer data-timer-paused="{{ running_timer_is_paused|yesno:'true,false' }}" data-timer-start-ms="{{ running_timer_start_ms }}" data-timer-server-now-ms="{{ running_timer_server_now_ms }}">
        <a href="{% url 'projects:detail' running_time_entry.project.pk %}">{{ running_time_entry.project.number }}</a>
        {% if running_timer_is_paused %}<span class="status-badge status-badge--paused">Paused</span>{% endif %}
        <span class="timer-clock" data-timer-clock aria-live="off">{{ running_timer_elapsed }}</span>
        {% if running_timer_is_paused %}
        <form method="post" action="{% url 'projects:timer-resume' %}">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ request.get_full_path }}">
            <button class="btn btn-sm btn-success" type="submit">Resume</button>
        </form>
        {% else %}
        <form method="post" action="{% url 'projects:timer-pause' %}">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ request.get_full_path }}">
            <button class="btn btn-sm btn-outline-warning" type="submit">Pause</button>
        </form>
        {% endif %}
        <form method="post" action="{% url 'projects:timer-stop' %}">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ request.get_full_path }}">
            <button class="btn btn-sm btn-danger" type="submit">Stop</button>
        </form>
    </div>
    {% else %}
    <a class="btn btn-sm btn-success" href="{% url 'projects:timer-start' %}{% if project %}?project={{ project.pk }}{% endif %}"><i class="bi bi-play-fill" aria-hidden="true"></i> Start timer</a>
    {% endif %}
</div>
